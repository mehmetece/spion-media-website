<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Giriş — Spion Media</title>
<link rel="icon" href="../images/logos/favicon.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-container{width:100%;max-width:420px;background:#111;border:1px solid #222;border-radius:4px;padding:48px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo h1{font-size:2.5rem;letter-spacing:0.05em;color:#c8a96e;font-weight:700;}
.login-logo p{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:#888;margin-top:8px;}
.login-form{display:flex;flex-direction:column;gap:20px;}
.form-group{display:flex;flex-direction:column;gap:8px;}
.form-group label{font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888;}
.form-group input{background:#1a1a1a;border:1px solid #222;border-radius:4px;color:#f0ede8;font-size:0.95rem;padding:14px 16px;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:#c8a96e;}
.btn-login{background:#c8a96e;color:#0a0a0a;border:none;border-radius:4px;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:16px;cursor:pointer;transition:all 0.2s;}
.btn-login:hover{background:#8a7248;transform:translateY(-1px);}
.btn-login:active{transform:translateY(0);}
.error-msg{background:#8a2a2a;color:#fff;padding:12px 16px;border-radius:4px;font-size:0.85rem;text-align:center;display:none;}
.error-msg.show{display:block;animation:shake 0.3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
.login-footer{text-align:center;margin-top:24px;font-size:0.75rem;color:#444;}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-logo">
    <h1>SPION<span style="color:#f0ede8">MEDIA</span></h1>
    <p>Admin Panel</p>
  </div>
  
  <form class="login-form" id="loginForm">
    <div class="error-msg" id="errorMsg">Hatalı şifre!</div>
    
    <div class="form-group">
      <label for="username">Kullanıcı Adı</label>
      <input type="text" id="username" value="admin" readonly/>
    </div>
    
    <div class="form-group">
      <label for="password">Şifre</label>
      <input type="password" id="password" placeholder="Şifrenizi girin" required autofocus/>
    </div>
    
    <button type="submit" class="btn-login">Giriş Yap</button>
  </form>
  
  <div class="login-footer">
    © 2025 Spion Media. Tüm hakları saklıdır.
  </div>
</div>

<script>
// Basit şifre koruması (Production'da daha güvenli bir sistem kullanın)
const ADMIN_PASSWORD = 'spion2025'; // Şifreyi değiştirin!

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  
  if (password === ADMIN_PASSWORD) {
    // Şifre doğru - session'a kaydet
    sessionStorage.setItem('spion_admin_auth', 'true');
    sessionStorage.setItem('spion_admin_time', Date.now());
    
    // Dashboard'a yönlendir
    window.location.href = 'dashboard.html';
  } else {
    // Hatalı şifre
    errorMsg.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
    
    setTimeout(function() {
      errorMsg.classList.remove('show');
    }, 3000);
  }
});

// Eğer zaten giriş yapılmışsa dashboard'a yönlendir
if (sessionStorage.getItem('spion_admin_auth') === 'true') {
  const loginTime = parseInt(sessionStorage.getItem('spion_admin_time'));
  const now = Date.now();
  const hourInMs = 3600000; // 1 saat
  
  // 1 saat içinde giriş yapılmışsa
  if (now - loginTime < hourInMs) {
    window.location.href = 'dashboard.html';
  } else {
    // Session süresi dolmuş
    sessionStorage.removeItem('spion_admin_auth');
    sessionStorage.removeItem('spion_admin_time');
  }
}
</script>
</body>
</html>
