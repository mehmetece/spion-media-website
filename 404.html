<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 - Sayfa Bulunamadı | Spion Media</title>
<link rel="icon" href="/images/logos/favicon.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.error-container{text-align:center;max-width:600px;}
.error-code{font-size:clamp(6rem,15vw,12rem);font-weight:900;color:#c8a96e;line-height:1;margin-bottom:20px;letter-spacing:-0.05em;}
.error-title{font-size:clamp(1.5rem,4vw,2.5rem);color:#f0ede8;margin-bottom:16px;font-weight:700;}
.error-desc{font-size:1rem;color:#888;line-height:1.6;margin-bottom:40px;}
.error-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:4px;font-size:0.9rem;font-weight:600;text-decoration:none;transition:all 0.3s ease;}
.btn-primary{background:#c8a96e;color:#0a0a0a;border:2px solid #c8a96e;}
.btn-primary:hover{background:transparent;color:#c8a96e;}
.btn-ghost{background:transparent;color:#c8a96e;border:2px solid #c8a96e;}
.btn-ghost:hover{background:#c8a96e;color:#0a0a0a;}
.error-links{margin-top:40px;padding-top:40px;border-top:1px solid #222;}
.error-links h3{font-size:0.9rem;color:#888;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.1em;}
.error-links-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.error-link{display:block;padding:12px;background:#111;border:1px solid #222;border-radius:4px;color:#c8a96e;text-decoration:none;font-size:0.85rem;transition:all 0.3s ease;}
.error-link:hover{border-color:#c8a96e;background:#1a1a1a;}
@media(max-width:576px){.error-actions{flex-direction:column;width:100%;}.btn{width:100%;justify-content:center;}}
</style>
</head>
<body>
<div class="error-container">
  <div class="error-code">404</div>
  <h1 class="error-title">Sayfa Bulunamadı</h1>
  <p class="error-desc">
    Aradığınız sayfa taşınmış, silinmiş veya hiç var olmamış olabilir. 
    Ana sayfaya dönebilir veya aşağıdaki linklerden devam edebilirsiniz.
  </p>
  
  <div class="error-actions">
    <a href="/" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ana Sayfa
    </a>
    <a href="/contact/index.html" class="btn btn-ghost">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      İletişim
    </a>
  </div>
  
  <div class="error-links">
    <h3>Popüler Sayfalar</h3>
    <div class="error-links-grid">
      <a href="/products.html" class="error-link">Hizmetler</a>
      <a href="/portfolio.html" class="error-link">Portfolyo</a>
      <a href="/references/index.html" class="error-link">Referanslar</a>
      <a href="/blog/index.html" class="error-link">Blog</a>
      <a href="/about/vision/index.html" class="error-link">Hakkımızda</a>
      <a href="/purplestore/index.html" class="error-link">MEDYA Store</a>
    </div>
  </div>
</div>
</body>
</html>
